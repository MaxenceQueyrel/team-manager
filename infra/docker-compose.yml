services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ..                  # repo root — needs optimizer/ and backend/ both
      dockerfile: backend/Dockerfile
      target: production
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/backend/data
    environment:
      - DATA_DIR=/app/backend/data
      - CORS_ORIGINS=http://localhost

volumes:
  backend_data:
